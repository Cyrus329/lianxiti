<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#147a7e">
  <title>专升本题库训练中心｜v39 备份导入修正版</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=20260717-v39-backup-import">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Question Bank</p>
        <h1>专升本题库训练中心 <small>7.16 第1天</small></h1>
      </div>
      <div class="top-actions">
        <button class="icon-button" id="reviewQueueButton" type="button" title="只刷今天该复习的题" aria-label="今日复习队列">
          <span aria-hidden="true">↻</span><span>今日复习</span>
        </button>
        <button class="icon-button secondary" id="wrongBookModeButton" type="button" title="只刷错题本" aria-label="只刷错题本">
          <span aria-hidden="true">✕</span><span>错题本</span>
        </button>
        <button class="icon-button secondary" id="wrongPlannerButton" type="button" title="按错因规划并生成类似题" aria-label="错题规划">
          <span aria-hidden="true">▦</span><span>错题规划</span>
        </button>
        <button class="icon-button secondary" id="auditModeButton" type="button" title="进入解析核查模式" aria-label="解析核查模式">
          <span aria-hidden="true">⚑</span><span>核查模式</span>
        </button>
        <button class="icon-button secondary" id="studyModeButton" type="button" title="切换单题学习模式" aria-label="单题模式">
          <span aria-hidden="true">□</span><span>单题模式</span>
        </button>
        <button class="icon-button secondary" id="textModeButton" type="button" title="切换图文版和纯文字版" aria-label="纯文字版">
          <span aria-hidden="true">文</span><span>纯文字版</span>
        </button>
        <button class="icon-button secondary" id="autoHideMasteredButton" type="button" title="连续做对3次的题自动隐藏" aria-label="隐藏熟练题">
          <span aria-hidden="true">✓</span><span>隐藏熟练题</span>
        </button>
        <button class="icon-button secondary" id="timerButton" type="button" title="倒计时刷题" aria-label="倒计时刷题">
          <span aria-hidden="true">⏱</span><span>倒计时</span>
        </button>
        <button class="icon-button secondary reset-all-choice-trigger" id="resetAllChoicesButton" type="button" title="一键清除全部题目的已选标识，保留统计和错题本" aria-label="重置全部选项">
          <span aria-hidden="true">↺</span><span>重置作答</span>
        </button>
        <button class="icon-button secondary" id="importBackupButton" type="button" title="导入以前导出的本地备份，恢复做题记录" aria-label="导入备份">
          <span aria-hidden="true">⬆</span><span>导入备份</span>
        </button>
        <button class="icon-button" id="cloudButton" type="button" title="导出本地备份，防止记录丢失" aria-label="导出备份">
          <span aria-hidden="true">⬇</span><span>导出备份</span>
        </button>
      </div>
    </header>
<header class="mobile-app-top" aria-label="手机端顶部导航">
      <div>
        <p id="mobileScreenTitle" class="mobile-screen-title">刷题</p>
        <strong>专升本题库</strong>
      </div>
      <div class="mobile-top-actions">
        <button class="mobile-pill" id="mobileFilterToggle" type="button">筛选</button>
        <button class="mobile-pill timer-pill" id="mobileTimerPill" type="button">25:00</button>
      </div>
    </header>

    <section class="toolbar" aria-label="题库筛选">
      <label class="field search-field">
        <span>搜索</span>
        <input id="searchInput" type="search" placeholder="题号、考点、关键词">
      </label>
      <label class="field">
        <span>科目</span>
        <select id="subjectFilter">
          <option value="all">全部可刷</option>
        </select>
      </label>
      <label class="field">
        <span>章节</span>
        <select id="chapterFilter">
          <option value="all">全部</option>
        </select>
      </label>

      <label class="field">
        <span>题源</span>
        <select id="sourceFilter">
          <option value="all">全部题源</option>
        </select>
      </label>
      <label class="field">
        <span>日期</span>
        <select id="dayFilter">
          <option value="all">全部日期</option>
        </select>
      </label>
      <label class="field">
        <span>状态</span>
        <select id="statusFilter">
          <option value="all">全部</option>
          <option value="dueReview">今日复习</option>
          <option value="weakChapter">薄弱章节</option>
          <option value="mastered">熟练题</option>
          <option value="answerReview">待核对题库</option>
          <option value="auditQueue">解析核查模式</option>
          <option value="auditFeedback">我标记的问题</option>
          <option value="auditLocked">解析已锁定</option>
          <option value="auditReference">原图备查/未逐题</option>
          <option value="auditAnswerOnly">仅答案</option>
          <option value="auditMissing">无答案解析</option>
          <option value="unseen">未做</option>
          <option value="wrong">最近做错</option>
          <option value="correct">最近做对</option>
          <option value="wrongBook">已进错题本</option>
        </select>
      </label>
      <label class="field">
        <span>难度</span>
        <select id="difficultyFilter">
          <option value="all">全部</option>
          <option value="1">难度 1</option>
          <option value="2">难度 2</option>
          <option value="3">难度 3</option>
          <option value="4">难度 4</option>
          <option value="5">难度 5</option>
        </select>
      </label>
    </section>

    <section class="stats-grid" aria-label="统计">
      <div class="stat-tile">
        <span>题库</span>
        <strong id="totalCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>当前筛选</span>
        <strong id="filteredCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>最近做错</span>
        <strong id="wrongCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>已进错题本</span>
        <strong id="wrongBookCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>今日复习</span>
        <strong id="dueReviewCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>连续打卡</span>
        <strong id="streakCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>今日完成</span>
        <strong id="dailyProgressCount">0/80</strong>
      </div>
      <div class="stat-tile">
        <span>熟练题</span>
        <strong id="masteredCount">0</strong>
      </div>
      <div class="stat-tile">
        <span>累计时长</span>
        <strong id="totalStudyTimeCount">0分钟</strong>
      </div>
    </section>

    <section class="dashboard-panel" id="dashboardPanel" aria-label="学习分析"></section>


    <section class="mobile-me-panel" id="mobileMePanel" aria-label="我的">
      <div class="mobile-me-card">
        <p class="eyebrow">Data</p>
        <h2>题库与备份</h2>
        <p class="mobile-me-muted">当前题库 <strong id="mobileTotalCount">0</strong> 道，当前筛选 <strong id="mobileFilteredCount">0</strong> 道。</p>
        <div class="mobile-me-grid">
          <button class="primary-button" id="mobileCloudButton" type="button">导出本地备份</button>
          <button class="secondary-button" id="mobileImportBackupButton" type="button">导入本地备份</button>
        </div>
      </div>
      <div class="mobile-me-card">
        <p class="eyebrow">Study Time</p>
        <h2>学习时长</h2>
        <p class="mobile-me-muted">累计 <strong id="mobileTotalStudyTime">0分钟</strong>，今日 <strong id="mobileTodayStudyTime">0分钟</strong>。</p>
      </div>
      <div class="mobile-me-card">
        <p class="eyebrow">Settings</p>
        <h2>学习设置</h2>
        <label class="mobile-setting-row">
          <span>每日目标</span>
          <input id="mobileDailyGoalInput" type="number" min="10" max="500" step="10" value="80">
        </label>
        <div class="mobile-me-grid">
          <button class="secondary-button" id="mobileMeStudyModeButton" type="button">单题模式</button>
          <button class="secondary-button" id="mobileTextModeButton" type="button">纯文字版</button>
          <button class="secondary-button" id="mobileMeAutoHideMasteredButton" type="button">隐藏熟练题</button>
          <button class="secondary-button" id="mobileMeTimerButton" type="button">开始倒计时</button>
          <button class="secondary-button reset-all-choice-trigger" id="mobileResetAllChoicesButton" type="button">重置全部选项</button>
          <button class="secondary-button" id="mobileWrongPlannerButton" type="button">错题规划与类似题</button>
          <button class="secondary-button" id="mobileBackupButton" type="button">导出本地备份</button>
        </div>
      </div>
    </section>


    <section class="mobile-similar-panel" id="mobileSimilarPanel" aria-label="同类题"></section>

    <main class="workspace">
      <section class="list-panel" aria-label="题目列表">
        <div class="panel-head">
          <div>
            <p class="eyebrow">List</p>
            <h2>题目</h2>
          </div>
          <div class="pager">
            <button id="prevPageButton" type="button" class="small-button" aria-label="上一页">‹</button>
            <span id="pageInfo">1 / 1</span>
            <button id="nextPageButton" type="button" class="small-button" aria-label="下一页">›</button>
          </div>
        </div>
        <div class="questions-list" id="questionsList" aria-live="polite"></div>
      </section>

      <section class="detail-panel" id="detailPanel" aria-label="题目详情">
        <div class="empty-detail">
          <p class="eyebrow">Detail</p>
          <h2>当前题库为空</h2>
          <p>当前已导入 7.16 第1天原题；题源按全方位与蓝色森林分开，答案和解析等待后续补充。</p>
        </div>
      </section>
    </main>
  </div>

  <nav class="mobile-tabbar" aria-label="手机端底部导航">
    <button class="mobile-tab-button active" type="button" data-mobile-tab="quiz"><span>刷题</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="similar"><span>同类</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="review"><span>复习</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="stats"><span>统计</span></button>
    <button class="mobile-tab-button" type="button" data-mobile-tab="me"><span>我的</span></button>
  </nav>

  <input id="backupFileInput" type="file" accept=".json,application/json" hidden>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['\\(', '\\)'], ['$', '$']], displayMath: [['\\[', '\\]']] },
      chtml: { scale: 1 },
      startup: {
        ready: () => {
          MathJax.startup.defaultReady();
          MathJax.startup.promise.then(() => window.dispatchEvent(new Event('mathjax-ready')));
        }
      }
    };
  </script>
  <script defer src="mathjax/tex-chtml-full.js"></script>
  <script src="core.js"></script>
  <script src="question-bank-data.js?v=20260717-v39-backup-import"></script>
  <script src="app.js?v=20260717-v39-backup-import"></script>
</body>
</html>
